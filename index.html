<script>
// ── PWA Manifest (injected inline as blob URL) ──────────────────────────
const manifestData = {
  name: "IronLog",
  short_name: "IronLog",
  description: "Gym session tracker with volume analysis",
  start_url: "./",
  display: "standalone",
  background_color: "#f4f4f2",

  orientation: "portrait",

    { src: "data:image/svg+xml," + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='80' fill='%23111'/><text x='256' y='340' text-anchor='middle' font-family='Impact,sans-serif' font-size='280' fill='%23e05c00'>IL</text></svg>`), sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
  ]
};
const manifestBlob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
const manifestURL = URL.createObjectURL(manifestBlob);
document.getElementById('manifest-placeholder').href = manifestURL;

<script type="module">
// ── Data ────────────────────────────────────────────────────────────────
const STORAGE_KEY = "gym_tracker_data_v1";

const EXERCISE_MUSCLES = {

const ALL_MUSCLES = Object.keys(MUSCLE_TARGETS);
const DEFAULT_EXERCISES = Object.keys(EXERCISE_MUSCLES);

const MUSCLE_ICONS = {

  "Hamstrings": `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M8 6 Q7 12 8 20 L10 20 Q10 12 10 6Z" fill="#555" opacity="0.3"/><path d="M14 6 Q15 12 14 20 L16 20 Q16 12 16 6Z" fill="#555" opacity="0.3"/><path d="M8 12 Q7 16 8 20 L10 20 Q10 16 10 12Z" fill="#e05c00" opacity="0.85"/><path d="M14 12 Q15 16 14 20 L16 20 Q16 12 14 12Z" fill="#e05c00" opacity="0.85"/></svg>`,

  "Side Delts": `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="7" r="2" fill="#555"/><rect x="10" y="9" width="4" height="9" rx="1" fill="#555" opacity="0.4"/><ellipse cx="5" cy="10" rx="3.5" ry="2" fill="#e05c00" opacity="0.85"/><ellipse cx="19" cy="10" rx="3.5" ry="2" fill="#e05c00" opacity="0.85"/></svg>`,
  "Rear Delts": `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="7" r="2" fill="#555"/><rect x="10" y="9" width="4" height="9" rx="1" fill="#555" opacity="0.4"/><ellipse cx="6" cy="11" rx="3" ry="2.5" fill="#e05c00" opacity="0.85" transform="rotate(20 6 11)"/><ellipse cx="18" cy="11" rx="3" ry="2.5" fill="#e05c00" opacity="0.85" transform="rotate(-20 18 11)"/></svg>`,

  "Core Stabilizers": `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="12" rx="7" ry="5" fill="none" stroke="#e05c00" stroke-width="2" opacity="0.85"/><ellipse cx="12" cy="12" rx="3" ry="2" fill="#e05c00" opacity="0.5"/><circle cx="12" cy="12" r="1.5" fill="#e05c00"/></svg>`,
  "Lower Back": `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="7" y="3" width="10" height="5" rx="2" fill="#555" opacity="0.3"/><rect x="8" y="9" width="8" height="7" rx="2" fill="#e05c00" opacity="0.85"/><rect x="10" y="3" width="4" height="18" rx="1" fill="#555" opacity="0.15"/></svg>`,
  "Other": `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" fill="#ddd"/><text x="12" y="16" text-anchor="middle" font-size="10" fill="#888">?</text></svg>`

// ── Helpers ─────────────────────────────────────────────────────────────
function getMusclesForExercise(exercise, customMap) {
  const custom = customMap && customMap[exercise];
  if (custom && typeof custom === "object" && !Array.isArray(custom)) return custom;
  return EXERCISE_MUSCLES[exercise] || {};
}
function getPrimaryMuscle(exercise, customMap) {
  const m = getMusclesForExercise(exercise, customMap);
  const entries = Object.entries(m);
  if (!entries.length) return null;
  return entries.reduce((a, b) => b[1] > a[1] ? b : a)[0];
}
function calcVolume(sessions, exerciseMuscles, filterFn) {
  const counts = {};
  for (const s of sessions) {
    if (filterFn && !filterFn(s)) continue;
    for (const entry of s.entries) {
      const muscles = getMusclesForExercise(entry.exercise, exerciseMuscles);
      const setCount = entry.sets.filter(x => x.reps && parseInt(x.reps) > 0).length;
      for (const [muscle, weight] of Object.entries(muscles))
        counts[muscle] = (counts[muscle] || 0) + setCount * weight;
    }
  }
  for (const m of Object.keys(counts)) counts[m] = Math.round(counts[m] * 10) / 10;
  return counts;
}
function getWeekBounds(dateStr) {
  const d = new Date(dateStr + "T12:00:00");
  const mon = new Date(d);
  mon.setDate(d.getDate() - ((d.getDay() + 6) % 7));
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  const fmt = x => x.toISOString().split("T")[0];
  return { start: fmt(mon), end: fmt(sun) };
}
function getWeekRange(offsetWeeks) {
  const today = new Date().toISOString().split("T")[0];
  const base = new Date(today + "T12:00:00");
  base.setDate(base.getDate() + offsetWeeks * 7);
  const bounds = getWeekBounds(base.toISOString().split("T")[0]);
  const mon = new Date(bounds.start + "T12:00:00");
  const sun = new Date(bounds.end + "T12:00:00");
  const label = offsetWeeks === 0 ? "This Week"
    : offsetWeeks === -1 ? "Last Week"
    : mon.toLocaleDateString("en", { month: "short", day: "numeric" }) + " - " + sun.toLocaleDateString("en", { month: "short", day: "numeric" });
  return { ...bounds, label };
}
function getPR(sessions, exercise) {
  let best = null;
  for (const s of sessions)
    for (const e of s.entries)
      if (e.exercise === exercise)
        for (const set of e.sets) {
          const w = parseFloat(set.weight), r = parseInt(set.reps);
          if (!isNaN(w) && !isNaN(r) && w > 0 && (!best || w > best.weight || (w === best.weight && r > best.reps)))
            best = { weight: w, reps: r, date: s.date };
        }
  return best;
}
function getLastSession(sessions, exercise) {
  for (let i = sessions.length - 1; i >= 0; i--)
    for (const e of sessions[i].entries)
      if (e.exercise === exercise) return { session: sessions[i], entry: e };
  return null;
}
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const base = { sessions: [], exercises: [...DEFAULT_EXERCISES], exerciseMuscles: {} };
    if (!raw) {
      for (const ex of DEFAULT_EXERCISES) base.exerciseMuscles[ex] = EXERCISE_MUSCLES[ex];
      return base;
    }
    const parsed = JSON.parse(raw);
    if (!parsed.sessions) parsed.sessions = [];
    if (!parsed.exercises) parsed.exercises = [...DEFAULT_EXERCISES];
    if (!parsed.exerciseMuscles) parsed.exerciseMuscles = {};
    for (const [ex, val] of Object.entries(parsed.exerciseMuscles))
      if (Array.isArray(val)) { const obj = {}; val.forEach(m => { obj[m] = 1; }); parsed.exerciseMuscles[ex] = obj; }
    for (const ex of DEFAULT_EXERCISES) {
      if (!parsed.exercises.includes(ex)) parsed.exercises.push(ex);
      parsed.exerciseMuscles[ex] = EXERCISE_MUSCLES[ex];
    }
    return parsed;
  } catch(e) {
    const base = { sessions: [], exercises: [...DEFAULT_EXERCISES], exerciseMuscles: {} };
    for (const ex of DEFAULT_EXERCISES) base.exerciseMuscles[ex] = EXERCISE_MUSCLES[ex];
    return base;
  }
}
function saveData(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {} }

// ── App State ────────────────────────────────────────────────────────────
let state = {
  data: loadData(),
  view: "dashboard",
  session: null,
  selEx: null,
  newExName: "",
  showAddEx: false,
  histFilter: "",
  weekOffset: 0,
  mappingEx: null,
  editSess: null,
  installPrompt: null,
  showInstallBanner: false,
};

function setState(patch) {
  state = { ...state, ...patch };
  if (patch.data !== undefined) saveData(state.data);
  render();
}

// ── PWA Install ──────────────────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  setState({ installPrompt: e, showInstallBanner: true });
});

// ── HTML helpers ─────────────────────────────────────────────────────────
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'className') el.className = v;
      else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
      else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === 'innerHTML') el.innerHTML = v;
      else if (v !== false && v !== null && v !== undefined) el.setAttribute(k, v);
    }
  }
  for (const child of children.flat()) {
    if (child == null || child === false) continue;
    el.appendChild(typeof child === 'string' ? document.createTextNode(child) : child);
  }
  return el;
}
function svgIcon(html) {
  const span = document.createElement('span');
  span.innerHTML = html;
  return span.firstChild;
}
function simpleBar(sets, min, max) {
  const pct = Math.min((sets / max) * 100, 100);
  const minPct = (min / max) * 100;
  const color = sets === 0 ? "#e0e0e0" : sets < min ? "#e08800" : sets > max ? "#cc2222" : "#1a7a1a";
  const wrap = h('div', { style: { position:"relative", height:"8px", background:"#ececec", borderRadius:"4px", flex:1 } });
  wrap.innerHTML = `<div style="position:absolute;left:${minPct}%;top:0;bottom:0;width:2px;background:#ccc"></div><div style="height:100%;width:${pct}%;background:${color};border-radius:4px;transition:width .4s"></div>`;
  return wrap;
}
function volumeBar(before, added, min, max) {
  const scale = max || 1;
  const beforePct = Math.min((before / scale) * 100, 100);
  const addedPct = Math.min((added / scale) * 100, Math.max(0, 100 - beforePct));
  const after = before + added;
  const color = after === 0 ? "#e0e0e0" : after < min ? "#e08800" : after > max ? "#cc2222" : "#1a7a1a";
  const wrap = h('div', { style: { position:"relative", height:"10px", background:"#ececec", borderRadius:"5px", flex:1 } });
  if (min > 0) { const tick = h('div', { style: { position:"absolute", left:(min/scale*100)+"%", top:0, bottom:0, width:"2px", background:"#d0d0d0" } }); wrap.appendChild(tick); }
  if (beforePct > 0) { const b = h('div', { style: { position:"absolute", left:0, top:0, bottom:0, width:beforePct+"%", background:"#c8c8c8", borderRadius:"5px 0 0 5px" } }); wrap.appendChild(b); }
  if (addedPct > 0) { const a = h('div', { style: { position:"absolute", left:beforePct+"%", top:0, bottom:0, width:addedPct+"%", background:color, borderRadius: beforePct===0?"5px":"0 5px 5px 0", opacity:0.9 } }); wrap.appendChild(a); }
  return wrap;
}

// ── Grouped exercises ────────────────────────────────────────────────────
function groupExercises() {
  const grouped = {};
  for (const ex of state.data.exercises) {
    const g = getPrimaryMuscle(ex, state.data.exerciseMuscles) || "Other";
    if (!grouped[g]) grouped[g] = [];
    grouped[g].push(ex);
  }
  const groups = [...ALL_MUSCLES.filter(m => grouped[m]), ...(grouped["Other"] ? ["Other"] : [])];
  return { grouped, groups };
}

function exColor(ex, weeklyVol) {
  const muscles = getMusclesForExercise(ex, state.data.exerciseMuscles);
  const entries = Object.entries(muscles);
  if (!entries.length) return "neutral";
  let hasRed = false, hasGreen = false;
  for (const [m, w] of entries) {
    if (w < 0.25) continue;
    const target = MUSCLE_TARGETS[m];
    if (!target) continue;
    const cur = weeklyVol[m] || 0;
    if (cur >= target.max) { hasRed = true; break; }
    if (cur < target.min) hasGreen = true;
  }
  if (hasRed) return "red";
  if (hasGreen) return "green";
  return "yellow";
}

function renderHistory() {

  );
  const inp = h('input', { className:"input-field", style:{marginTop:"12px",marginBottom:"14px"}, placeholder:"Search by exercise...", value:state.histFilter,

  if (!filtered.length) {
    return h('div', {},
      h('span', { style:{fontSize:"1.5rem",letterSpacing:"3px"} }, "HISTORY"), inp,
      h('p', { style:{fontFamily:"'DM Mono',monospace",color:"#bbb",textAlign:"center",padding:"40px 0"} }, "No sessions yet")
    );
  }

  const cards = filtered.map((sess, idx) => {
    const realIdx = state.data.sessions.length - 1 - idx;
    const sessVol = calcVolume([sess], state.data.exerciseMuscles);
    const bounds = getWeekBounds(sess.date);
    const beforeVol = calcVolume(state.data.sessions.filter(s => s !== sess), state.data.exerciseMuscles, s => s.date >= bounds.start && s.date <= bounds.end);
    const trainedMuscles = Object.keys(sessVol).sort((a,b) => sessVol[b] - sessVol[a]);

    const entryLines = sess.entries.map(e =>
      h('div', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.82rem",color:"#888",marginBottom:"5px"} },
        h('span', { style:{color:"#111"} }, e.exercise), " — " + e.sets.map(s => `${s.weight}lb x ${s.reps}`).join(", ")
      )
    );

    let volSection = h('span', {});
    if (trainedMuscles.length > 0) {
      const mRows = trainedMuscles.map(m => {
        const target = MUSCLE_TARGETS[m];
        const before = Math.round((beforeVol[m]||0)*10)/10;
        const added = sessVol[m]||0;
        const after = Math.round((before+added)*10)/10;
        const max = target ? target.max : Math.max(after, 10);
        const min = target ? target.min : 0;
        const afterColor = !target?"#aaa":after<min?"#e08800":after>max?"#cc2222":"#1a7a1a";
        return h('div', { style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"9px"} },
          h('span', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.72rem",color:"#666",width:"108px",flexShrink:0} }, m),
          volumeBar(before, added, min, max),
          h('span', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.72rem",color:afterColor,width:"28px",textAlign:"right",flexShrink:0,fontWeight:500} }, String(after)),
          target ? h('span', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.6rem",color:"#ccc",width:"38px",flexShrink:0} }, `${min}–${max}`) : h('span',{})
        );
      });
      volSection = h('div', { style:{marginTop:"14px",paddingTop:"12px",borderTop:"1px solid #f0f0f0"} },
        h('p', { className:"slabel" }, "WEEKLY SETS AFTER THIS SESSION"),
        ...mRows,
        h('div', { style:{display:"flex",gap:"12px",marginTop:"8px",fontFamily:"'DM Mono',monospace",fontSize:"0.62rem",color:"#bbb"} },
          h('span', {}, h('span', { style:{display:"inline-block",width:"10px",height:"8px",background:"#c8c8c8",borderRadius:"2px",marginRight:"4px",verticalAlign:"middle"} }), "before"),
          h('span', {}, h('span', { style:{display:"inline-block",width:"10px",height:"8px",background:"#1a7a1a",borderRadius:"2px",marginRight:"4px",verticalAlign:"middle"} }), "added")
        )
      );
    }

    return h('div', { className:"card" },
      h('div', { style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"} },
        h('span', { className:"tag" }, sess.date),
        h('div', { style:{display:"flex",gap:"8px"} },
          h('button', { className:"btn-ghost", style:{padding:"8px 14px",fontSize:"0.85rem"}, onClick:() => setState({ editSess: { idx: realIdx, session: JSON.parse(JSON.stringify(state.data.sessions[realIdx])) } }) }, "EDIT"),

  return h('div', {}, h('span', { style:{fontSize:"1.5rem",letterSpacing:"3px"} }, "HISTORY"), inp, ...cards);

      h('div', { className:"pr-card" },
        h('div', {},
          h('div', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.88rem",marginBottom:"4px"} }, exercise),
          h('div', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.65rem",color:"#aaa"} }, pr.date)
        ),
        h('div', { style:{textAlign:"right"} },
          h('div', { style:{color:"#e05c00",fontSize:"1.5rem",letterSpacing:"1px"} }, String(pr.weight), h('span', { style:{fontSize:"0.8rem",color:"#aaa",marginLeft:"3px"} }, "lb")),
          h('div', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.72rem",color:"#888"} }, `${pr.reps} reps`)
        )
      )
    ) : [h('p', { style:{fontFamily:"'DM Mono',monospace",color:"#bbb",textAlign:"center",padding:"40px 0"} }, "Log sessions to see PRs here")])
  );
}

function renderMappingModal() {
  if (!state.mappingEx) return h('span', {});
  const rows = ALL_MUSCLES.map(m => {
    const current = getMusclesForExercise(state.mappingEx, state.data.exerciseMuscles);
    const val = current[m] || 0;
    const btns = [0, 0.25, 0.5, 0.75, 1].map(step => {
      const btn = h('button', {
        style: { flex:1, padding:"10px 0", border:"1.5px solid " + (val===step?"#111":"#ddd"), background: val===step?"#111":"#fafafa",
          color: val===step?"#fff":"#888", fontFamily:"'DM Mono',monospace", fontSize:"0.65rem", cursor:"pointer", borderRadius:"8px" },
        onClick: () => {
          const next = { ...current };
          if (step === 0) delete next[m]; else next[m] = step;
          setState({ data: { ...state.data, exerciseMuscles: { ...state.data.exerciseMuscles, [state.mappingEx]: next } } });
        }
      }, step === 0 ? "—" : String(step));
      return btn;
    });
    return h('div', { style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"} },
      h('span', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.73rem",color:val>0?"#111":"#bbb",width:"104px",flexShrink:0} }, m),
      h('div', { style:{display:"flex",gap:"6px",flex:1} }, ...btns)
    );
  });
  const modal = h('div', { className:"modal", onClick: e => e.stopPropagation() },
    h('div', { className:"modal-handle" }),
    h('div', { style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"} },
      h('span', { style:{fontSize:"1.3rem",letterSpacing:"2px"} }, state.mappingEx),
      h('button', { className:"btn-icon", onClick:() => setState({ mappingEx: null }) }, "✕")
    ),
    h('p', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.7rem",color:"#888",marginBottom:"18px"} }, "1.0 = primary, 0.5 = secondary, — = none"),
    ...rows
  );
  return h('div', { className:"overlay", onClick:() => setState({ mappingEx: null }) }, modal);
}

function renderEditModal() {
  if (!state.editSess) return h('span', {});
  const sess = state.editSess.session;

  const entryCards = sess.entries.map((entry, ei) => {
    const setRows = entry.sets.map((set, si) => {
      const wInp = h('input', { className:"num-input", type:"number", inputmode:"decimal", placeholder:"0", value:set.weight });
      wInp.addEventListener('input', e => {
        const s = JSON.parse(JSON.stringify(state.editSess));
        s.session.entries[ei].sets[si].weight = e.target.value;
        setState({ editSess: s });
      });
      const rInp = h('input', { className:"num-input", type:"number", inputmode:"numeric", placeholder:"0", value:set.reps });
      rInp.addEventListener('input', e => {
        const s = JSON.parse(JSON.stringify(state.editSess));
        s.session.entries[ei].sets[si].reps = e.target.value;
        setState({ editSess: s });
      });
      const del = h('button', { className:"btn-icon", style:{color:"#cc4444"}, onClick:() => {
        const s = JSON.parse(JSON.stringify(state.editSess));
        const sets = s.session.entries[ei].sets.filter((_,j) => j!==si);
        s.session.entries[ei].sets = sets.length ? sets : [{weight:"",reps:""}];
        setState({ editSess: s });
      }}, "✕");
      return h('div', { className:"set-row" }, h('span', { className:"set-num" }, String(si+1)), wInp, rInp, del);
    });
    const addSetBtn = h('button', { className:"btn-ghost", style:{marginTop:"8px",fontSize:"0.9rem",padding:"10px 16px"}, onClick:() => {
      const s = JSON.parse(JSON.stringify(state.editSess));
      s.session.entries[ei].sets.push({weight:"",reps:""});
      setState({ editSess: s });
    }}, "+ SET");
    const removeBtn = h('button', { className:"btn-del", style:{fontSize:"0.78rem",padding:"7px 12px"}, onClick:() => {
      const s = JSON.parse(JSON.stringify(state.editSess));
      s.session.entries = s.session.entries.filter((_,i) => i!==ei);
      setState({ editSess: s });
    }}, "REMOVE");
    return h('div', { style:{background:"#f8f8f8",border:"1px solid #ebebeb",borderRadius:"10px",padding:"14px",marginBottom:"10px"} },
      h('div', { style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"} },
        h('span', { style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1rem",letterSpacing:"2px"} }, entry.exercise),
        removeBtn
      ),
      ...setRows, addSetBtn
    );
  });

  const addExPills = state.data.exercises.filter(ex => !sess.entries.find(e => e.exercise === ex)).map(ex =>
    h('button', { className:"ex-pill", onClick:() => {
      const s = JSON.parse(JSON.stringify(state.editSess));
      s.session.entries.push({ exercise: ex, sets: [{weight:"",reps:""}] });
      setState({ editSess: s });
    }}, ex)
  );

  const dateInp = h('input', { type:"date", value:sess.date,
    style:{fontFamily:"'DM Mono',monospace",fontSize:"0.82rem",background:"#f5f5f5",border:"1.5px solid #e0e0e0",borderRadius:"8px",padding:"8px 12px",color:"#444"} });
  dateInp.addEventListener('change', e => {
    const s = JSON.parse(JSON.stringify(state.editSess));
    s.session.date = e.target.value;
    setState({ editSess: s });
  });

  const modal = h('div', { className:"modal", style:{maxWidth:"520px"}, onClick: e => e.stopPropagation() },
    h('div', { className:"modal-handle" }),
    h('div', { style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"} },
      h('div', { style:{display:"flex",alignItems:"center",gap:"10px"} },
        h('span', { style:{fontSize:"1.3rem",letterSpacing:"3px"} }, "EDIT"),
        dateInp
      ),
      h('button', { className:"btn-icon", onClick:() => setState({ editSess: null }) }, "✕")
    ),
    ...entryCards,
    h('details', { style:{marginTop:"4px",marginBottom:"16px"} },
      h('summary', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.78rem",color:"#888",cursor:"pointer",padding:"10px 0",listStyle:"none"} }, "+ Add exercise to session"),
      h('div', { style:{display:"flex",flexWrap:"wrap",gap:"8px",marginTop:"10px"} }, ...addExPills)
    ),
    h('button', { className:"btn-primary", style:{fontSize:"1.1rem",letterSpacing:"3px"}, onClick:() => {
      const newSessions = state.data.sessions.map((s,i) => i === state.editSess.idx ? state.editSess.session : s);
      setState({ data: { ...state.data, sessions: newSessions }, editSess: null });
    }}, "SAVE CHANGES")
  );
  return h('div', { className:"overlay", onClick:() => setState({ editSess: null }) }, modal);
}

// ── Main render ──────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const weekRange = getWeekRange(state.weekOffset);
  const weeklyVol = calcVolume(state.data.sessions, state.data.exerciseMuscles, s => s.date >= weekRange.start && s.date <= weekRange.end);
  const prs = state.data.exercises.map(ex => ({ exercise: ex, pr: getPR(state.data.sessions, ex) })).filter(x => x.pr);

  const NAV = [
    { id:"dashboard", icon:"⚡", label:"Home" },
    { id:"log",       icon:"✏️",  label:"Log" },
    { id:"volume",    icon:"📊", label:"Volume" },
    { id:"history",   icon:"📋", label:"History" },
    { id:"prs",       icon:"🏆", label:"PRs" },
  ];

  const installBanner = (state.showInstallBanner && state.installPrompt) ? h('div', { className:"install-banner" },
    h('span', {}, "Add IronLog to your home screen"),
    h('div', { style:{display:"flex",gap:"8px"} },
      h('button', { onClick: async () => {
        state.installPrompt.prompt();
        await state.installPrompt.userChoice;
        setState({ showInstallBanner: false, installPrompt: null });
      }}, "INSTALL"),
      h('button', { className:"dismiss", onClick:() => setState({ showInstallBanner: false }) }, "Later")
    )
  ) : h('span', {});

  const topBar = h('div', { className:"top-bar" },
    h('div', { style:{display:"flex",alignItems:"baseline",gap:"2px"} },
      h('span', { style:{fontSize:"1.7rem",letterSpacing:"4px"} }, "IRON"),
      h('span', { style:{fontSize:"1.7rem",letterSpacing:"4px",color:"#e05c00"} }, "LOG"),
      state.session ? h('span', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.62rem",color:"#e05c00",marginLeft:"10px",background:"#fff5f0",border:"1px solid #ffd0b0",padding:"2px 8px",borderRadius:"4px"} }, "LIVE") : h('span', {})
    )
  );

  let pageContent;
  if (state.view === "dashboard") pageContent = renderDashboard(weeklyVol, prs);
  else if (state.view === "log") pageContent = renderLog(weeklyVol);
  else if (state.view === "volume") pageContent = renderVolume(weeklyVol);
  else if (state.view === "history") pageContent = renderHistory();
  else pageContent = renderPRs(prs);

  const bottomNav = h('div', { className:"bottom-nav" },
    ...NAV.map(n => {
      const item = h('button', { className:"nav-item" + (state.view===n.id?" active":""), onClick:() => setState({ view: n.id }) },
        h('span', { className:"nav-icon" }, n.icon),
        h('span', { className:"nav-label" }, n.label),
        ...(state.view===n.id ? [h('span', { className:"nav-dot" })] : [])
      );
      return item;
    })
  );

  const shell = h('div', { className:"app-shell" },
    installBanner, topBar,
    h('div', { className:"page-content" }, pageContent),
    bottomNav
  );

  app.innerHTML = '';
  app.appendChild(shell);
  app.appendChild(renderMappingModal());
  app.appendChild(renderEditModal());
}

render();
</script>
</body>
</html>

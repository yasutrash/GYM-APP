      --text3:     #888888;

      --accent:    #1a8a3a;
      --accent-bg: #0e2018;
      --accent-bd: #1a5c2a;
      --shadow:    rgba(0,0,0,0.4);
      --shadow2:   rgba(0,0,0,0.3);
      --overlay:   rgba(0,0,0,0.7);

      --pr-accent: #f0f0f0;
      --set-num:   #555555;

    #app { height: 100%; }

    input[type="number"] { font-family: 'DM Mono', monospace; -moz-appearance: textfield; }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .app-shell { display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
    .top-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px 10px; padding-top: calc(12px + env(safe-area-inset-top, 0px)); position: sticky; top: 0; z-index: 50; box-shadow: 0 1px 4px var(--shadow); }
    .page-content { flex: 1; padding: 16px 14px 100px; max-width: 600px; margin: 0 auto; width: 100%; overflow-y: auto; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 50; padding-bottom: env(safe-area-inset-bottom, 0px); box-shadow: 0 -1px 8px var(--shadow); }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 4px 4px; border: none; background: none; cursor: pointer; gap: 2px; min-height: 58px; -webkit-tap-highlight-color: transparent; }
    .nav-icon { font-size: 1.3rem; line-height: 1; }
    .nav-label { font-family: 'DM Mono', monospace; font-size: 0.55rem; letter-spacing: 1px; color: var(--text4); }
    .nav-item.active .nav-label { color: var(--accent); }
    .nav-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); margin-top: 2px; }

    .btn-primary { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; cursor: pointer; border: none; border-radius: 10px; padding: 15px 20px; font-size: 1.1rem; background: var(--btn-bg); color: var(--btn-text); width: 100%; -webkit-tap-highlight-color: transparent; display: block; }
    .btn-primary:disabled { opacity: 0.3; }
    .btn-ghost { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; cursor: pointer; border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 18px; font-size: 0.95rem; background: none; color: var(--text2); -webkit-tap-highlight-color: transparent; }
    .btn-del { font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; cursor: pointer; border: 1.5px solid #ffbbbb; background: none; color: #cc4444; font-size: 0.85rem; padding: 9px 14px; border-radius: 8px; -webkit-tap-highlight-color: transparent; }
    .btn-icon { background: none; border: none; cursor: pointer; padding: 8px; border-radius: 8px; line-height: 1; -webkit-tap-highlight-color: transparent; color: var(--text3); font-size: 1.2rem; }
    .input-field { background: var(--surface2); border: 1.5px solid var(--border); color: var(--text); padding: 13px 14px; font-size: 1rem; border-radius: 10px; width: 100%; font-family: 'DM Mono', monospace; }
    .input-field:focus { outline: none; border-color: var(--text); background: var(--surface); }
    .num-input { background: var(--surface2); border: 1.5px solid var(--border); color: var(--text); padding: 13px 6px; font-size: 1.15rem; border-radius: 10px; width: 80px; text-align: center; font-family: 'DM Mono', monospace; }
    .num-input:focus { outline: none; border-color: var(--accent); background: var(--surface); }
    .ex-pill { background: var(--pill-bg); border: 1.5px solid var(--border); color: var(--text2); font-family: system-ui, -apple-system, sans-serif; font-size: 0.88rem; padding: 10px 14px; cursor: pointer; border-radius: 8px; -webkit-tap-highlight-color: transparent; }
    .ex-pill.sel { background: var(--btn-bg); color: var(--btn-text); border-color: var(--btn-bg); }
    @keyframes pill-tap { 0% { transform: scale(1); opacity: 1; } 30% { transform: scale(0.84); opacity: 1; } 100% { transform: scale(0.84); opacity: 0.7; } }

    .hint { background: var(--hint-bg); border: 1px dashed var(--hint-bd); color: var(--hint-text); font-family: 'DM Mono', monospace; font-size: 0.72rem; padding: 10px 12px; border-radius: 8px; margin-bottom: 10px; }
    .divider { border: none; border-top: 1px solid var(--divider); margin: 16px 0; }
    .vol-row { display: flex; align-items: center; gap: 10px; margin-bottom: 13px; }
    .vol-label { font-family: 'DM Mono', monospace; font-size: 0.73rem; width: 108px; color: var(--vol-label); flex-shrink: 0; }
    .vol-count { font-family: 'DM Mono', monospace; font-size: 0.82rem; width: 28px; text-align: right; flex-shrink: 0; font-weight: 500; }
    .vol-target { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--text4); flex-shrink: 0; width: 40px; }
    .su { color: #c07000; } .sok { color: #1a7a1a; } .so { color: #cc2222; }
    .set-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
    .set-num { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--set-num); width: 20px; text-align: center; flex-shrink: 0; }
    .badge { background: var(--btn-bg); color: var(--btn-text); font-family: 'DM Mono', monospace; font-size: 0.7rem; padding: 3px 9px; border-radius: 4px; }
    .pr-card { background: var(--surface); border: 1px solid var(--border2); border-left: 3px solid var(--pr-accent); padding: 14px 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-radius: 10px; }
    .slabel { font-family: 'DM Mono', monospace; font-size: 0.63rem; color: var(--text4); letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; }
    .overlay { position: fixed; inset: 0; background: var(--overlay); z-index: 200; display: flex; align-items: flex-end; }
    .modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 12px 16px 20px; width: 100%; max-height: 88vh; overflow-y: auto; padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px)); }
    .modal-handle { width: 40px; height: 4px; background: var(--modal-handle); border-radius: 2px; margin: 0 auto 16px; }
    .hidden { display: none !important; }
    .flex { display: flex; } .flex-col { flex-direction: column; } .items-center { align-items: center; }
    .gap8 { gap: 8px; } .gap10 { gap: 10px; } .wrap { flex-wrap: wrap; }
    .muscle-hdr { font-family: 'Bebas Neue', sans-serif; font-size: 0.92rem; color: var(--text2); letter-spacing: 3px; margin-bottom: 10px; margin-top: 6px; display: flex; align-items: center; gap: 10px; line-height: 1; }
    .install-banner { background: var(--btn-bg); color: var(--btn-text); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; font-family: 'DM Mono', monospace; font-size: 0.75rem; }
    .install-banner button { font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; background: #1a8a3a; border: none; color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; white-space: nowrap; }
    .install-banner .dismiss { background: none; border: 1px solid #444; color: #888; padding: 6px 10px; font-size: 0.75rem; }
    .theme-toggle { background: none; border: 1.5px solid var(--border); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 1.1rem; line-height: 1; -webkit-tap-highlight-color: transparent; color: var(--text2); }
  </style>

// ── Helpers ─────────────────────────────────────────────────────────────
function getMusclesForExercise(exercise, customMap) {
  const custom = customMap && customMap[exercise];
  if (custom && typeof custom === "object" && !Array.isArray(custom)) return custom;
  return EXERCISE_MUSCLES[exercise] || {};
}
function getPrimaryMuscle(exercise, customMap) {
  const m = getMusclesForExercise(exercise, customMap);
  const entries = Object.entries(m);
  if (!entries.length) return null;
  return entries.reduce((a, b) => b[1] > a[1] ? b : a)[0];
}
function calcVolume(sessions, exerciseMuscles, filterFn) {
  const counts = {};
  for (const s of sessions) {
    if (filterFn && !filterFn(s)) continue;
    for (const entry of s.entries) {
      const muscles = getMusclesForExercise(entry.exercise, exerciseMuscles);
      const setCount = entry.sets.filter(x => x.reps && parseInt(x.reps) > 0).length;
      for (const [muscle, weight] of Object.entries(muscles))
        counts[muscle] = (counts[muscle] || 0) + setCount * weight;
    }
  }
  for (const m of Object.keys(counts)) counts[m] = Math.round(counts[m] * 10) / 10;
  return counts;
}
function getWeekBounds(dateStr) {
  const d = new Date(dateStr + "T12:00:00");
  const mon = new Date(d);
  mon.setDate(d.getDate() - ((d.getDay() + 6) % 7));
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  const fmt = x => x.toISOString().split("T")[0];
  return { start: fmt(mon), end: fmt(sun) };
}
function getWeekRange(offsetWeeks) {
  const today = new Date().toISOString().split("T")[0];
  const base = new Date(today + "T12:00:00");
  base.setDate(base.getDate() + offsetWeeks * 7);
  const bounds = getWeekBounds(base.toISOString().split("T")[0]);
  const mon = new Date(bounds.start + "T12:00:00");
  const sun = new Date(bounds.end + "T12:00:00");
  const label = offsetWeeks === 0 ? "This Week"
    : offsetWeeks === -1 ? "Last Week"
    : mon.toLocaleDateString("en", { month: "short", day: "numeric" }) + " - " + sun.toLocaleDateString("en", { month: "short", day: "numeric" });
  return { ...bounds, label };
}
function getPR(sessions, exercise) {
  let best = null;
  for (const s of sessions)
    for (const e of s.entries)
      if (e.exercise === exercise)
        for (const set of e.sets) {
          const w = parseFloat(set.weight), r = parseInt(set.reps);
          if (!isNaN(w) && !isNaN(r) && w > 0 && (!best || w > best.weight || (w === best.weight && r > best.reps)))
            best = { weight: w, reps: r, date: s.date };
        }
  return best;
}
function getLastSession(sessions, exercise) {
  for (let i = sessions.length - 1; i >= 0; i--)
    for (const e of sessions[i].entries)
      if (e.exercise === exercise) return { session: sessions[i], entry: e };
  return null;
}
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const base = { sessions: [], exercises: [...DEFAULT_EXERCISES], exerciseMuscles: {} };
    if (!raw) {
      for (const ex of DEFAULT_EXERCISES) base.exerciseMuscles[ex] = EXERCISE_MUSCLES[ex];
      return base;
    }
    const parsed = JSON.parse(raw);
    if (!parsed.sessions) parsed.sessions = [];
    if (!parsed.exercises) parsed.exercises = [...DEFAULT_EXERCISES];
    if (!parsed.exerciseMuscles) parsed.exerciseMuscles = {};
    for (const [ex, val] of Object.entries(parsed.exerciseMuscles))
      if (Array.isArray(val)) { const obj = {}; val.forEach(m => { obj[m] = 1; }); parsed.exerciseMuscles[ex] = obj; }
    for (const ex of DEFAULT_EXERCISES) {
      if (!parsed.exercises.includes(ex)) parsed.exercises.push(ex);
      parsed.exerciseMuscles[ex] = EXERCISE_MUSCLES[ex];
    }
    return parsed;
  } catch(e) {
    const base = { sessions: [], exercises: [...DEFAULT_EXERCISES], exerciseMuscles: {} };
    for (const ex of DEFAULT_EXERCISES) base.exerciseMuscles[ex] = EXERCISE_MUSCLES[ex];
    return base;
  }
}
function saveData(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {} }

function saveDraft(session) { try { localStorage.setItem(SESSION_DRAFT_KEY, JSON.stringify(session)); } catch(e) {} }

// Update session input values without re-rendering (prevents focus loss)
let _volumeDebounce = null;
function silentUpdateSet(ei, si, field, value) {
  if (!state.session) return;
  state.session = { ...state.session,
    entries: state.session.entries.map((en, i) => i !== ei ? en : {
      ...en, sets: en.sets.map((st, j) => j !== si ? st : { ...st, [field]: value })
    })
  };
  // Debounce the full re-render so typing stays instant (fires 600ms after last keystroke)
  if (state.session) saveDraft(state.session);
  clearTimeout(_volumeDebounce);
  _volumeDebounce = setTimeout(() => {
    const active = document.activeElement;
    const activeId = active ? active.dataset.inputId : null;
    render();
    if (activeId) {
      const restored = document.querySelector(`[data-input-id="${activeId}"]`);
      if (restored) {
        restored.focus();
        const v = restored.value;
        restored.value = '';
        restored.value = v;
      }
    }
  }, 600);
}

// ── HTML helpers ─────────────────────────────────────────────────────────
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) {
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'className') el.className = v;
      else if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
      else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === 'innerHTML') el.innerHTML = v;
      else if (v !== false && v !== null && v !== undefined) el.setAttribute(k, v);
    }
  }
  for (const child of children.flat()) {
    if (child == null || child === false) continue;
    el.appendChild(typeof child === 'string' ? document.createTextNode(child) : child);
  }
  return el;
}
function svgIcon(html) {
  const span = document.createElement('span');
  span.innerHTML = html;
  return span.firstChild;
}
function simpleBar(sets, min, max) {
  const pct = Math.min((sets / max) * 100, 100);
  const minPct = (min / max) * 100;
  const color = sets === 0 ? "#e0e0e0" : sets < min ? "#e08800" : sets > max ? "#cc2222" : "#1a7a1a";
  const wrap = h('div', { style: { position:"relative", height:"8px", background:"#ececec", borderRadius:"4px", flex:1 } });
  wrap.innerHTML = `<div style="position:absolute;left:${minPct}%;top:0;bottom:0;width:2px;background:#ccc"></div><div style="height:100%;width:${pct}%;background:${color};border-radius:4px;transition:width .4s"></div>`;
  return wrap;
}
function volumeBar(before, added, min, max) {
  const scale = max || 1;
  const beforePct = Math.min((before / scale) * 100, 100);
  const addedPct = Math.min((added / scale) * 100, Math.max(0, 100 - beforePct));
  const after = before + added;
  const color = after === 0 ? "#e0e0e0" : after < min ? "#e08800" : after > max ? "#cc2222" : "#1a7a1a";
  const wrap = h('div', { style: { position:"relative", height:"10px", background:"#ececec", borderRadius:"5px", flex:1 } });
  if (min > 0) { const tick = h('div', { style: { position:"absolute", left:(min/scale*100)+"%", top:0, bottom:0, width:"2px", background:"#d0d0d0" } }); wrap.appendChild(tick); }
  if (beforePct > 0) { const b = h('div', { style: { position:"absolute", left:0, top:0, bottom:0, width:beforePct+"%", background:"#c8c8c8", borderRadius:"5px 0 0 5px" } }); wrap.appendChild(b); }
  if (addedPct > 0) { const a = h('div', { style: { position:"absolute", left:beforePct+"%", top:0, bottom:0, width:addedPct+"%", background:color, borderRadius: beforePct===0?"5px":"0 5px 5px 0", opacity:0.9 } }); wrap.appendChild(a); }
  return wrap;
}

// ── Grouped exercises ────────────────────────────────────────────────────
function groupExercises() {
  const grouped = {};
  for (const ex of state.data.exercises) {
    const g = getPrimaryMuscle(ex, state.data.exerciseMuscles) || "Other";
    if (!grouped[g]) grouped[g] = [];
    grouped[g].push(ex);
  }

  // Score each muscle group by urgency: how far below min target (as % of range)
  // Higher score = needs more work = sorts to top
  function muscleUrgency(muscle) {
    const target = MUSCLE_TARGETS[muscle];
    if (!target) return 0;
    const vol = (state.weekOffset === 0 && state.session)
      ? (() => {
          // Include in-progress session sets in urgency calc
          const weekRange = getWeekRange(0);
          const savedVol = calcVolume(state.data.sessions, state.data.exerciseMuscles, s => s.date >= weekRange.start && s.date <= weekRange.end);
          const liveVol = calcVolume([state.session], state.data.exerciseMuscles);
          return (savedVol[muscle] || 0) + (liveVol[muscle] || 0);
        })()
      : (state._weeklyVol ? state._weeklyVol[muscle] || 0 : 0);
    const { min, max } = target;
    if (vol >= max) return -1;           // over max = push to bottom
    if (vol >= min) return (min - vol);  // in range = slightly negative, order by how close to min
    return (min - vol) / min * 100;      // below min = most urgent, higher = more urgent
  }

  const groups = [
    ...ALL_MUSCLES.filter(m => grouped[m]).sort((a, b) => muscleUrgency(b) - muscleUrgency(a)),
    ...(grouped["Other"] ? ["Other"] : [])
  ];
  return { grouped, groups };
}

function exColor(ex, weeklyVol) {
  const muscles = getMusclesForExercise(ex, state.data.exerciseMuscles);
  const entries = Object.entries(muscles);
  if (!entries.length) return "neutral";
  let hasRed = false, hasGreen = false;
  for (const [m, w] of entries) {
    if (w < 0.25) continue;
    const target = MUSCLE_TARGETS[m];
    if (!target) continue;
    const cur = weeklyVol[m] || 0;
    if (cur >= target.max) { hasRed = true; break; }
    if (cur < target.min) hasGreen = true;
  }
  if (hasRed) return "red";
  if (hasGreen) return "green";
  return "yellow";
}

function renderVolume(weeklyVol) {
  const weekRange = getWeekRange(state.weekOffset);
  const weekNav = h('div', { style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"20px"} },
    h('button', { style:{background:"#f5f5f5",border:"1.5px solid #e0e0e0",color:"#555",fontSize:"1.3rem",width:"44px",height:"44px",cursor:"pointer",borderRadius:"10px",flexShrink:0},
      onClick:() => setState({ weekOffset: state.weekOffset - 1 }) }, "<"),
    h('span', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.82rem",color:"#222",flex:1,textAlign:"center"} }, weekRange.label),
    h('button', { style:{background:"#f5f5f5",border:"1.5px solid #e0e0e0",color: state.weekOffset===0?"#ccc":"#555",fontSize:"1.3rem",width:"44px",height:"44px",cursor:"pointer",borderRadius:"10px",flexShrink:0},
      disabled: state.weekOffset === 0, onClick:() => setState({ weekOffset: Math.min(state.weekOffset + 1, 0) }) }, ">")
  );

  const muscleRows = ALL_MUSCLES.map(m => {
    const sets = weeklyVol[m] || 0;
    const {min, max} = MUSCLE_TARGETS[m];
    const cls = sets===0?"":sets<min?"su":sets>max?"so":"sok";
    return h('div', { className:"vol-row" },
      h('span', { className:"vol-label" }, m), simpleBar(sets, min, max),
      h('span', { className:"vol-count " + cls }, String(sets)),
      h('span', { className:"vol-target" }, `${min}–${max}`)
    );
  });

  const { grouped, groups } = groupExercises();
  const exGroups = groups.map(g => {
    const pills = grouped[g].map(ex => {
      const mc = Object.keys(getMusclesForExercise(ex, state.data.exerciseMuscles)).length;
      const wrap = h('div', { style:{display:"flex",alignItems:"center",background:"#f5f5f5",border:"1.5px solid #e8e8e8",borderRadius:"8px",overflow:"hidden"} });
      const nameBtn = h('button', { style:{background:"none",border:"none",cursor:"pointer",padding:"10px 12px",fontFamily:"system-ui,-apple-system,sans-serif",fontSize:"0.8rem",color:"#333",display:"flex",alignItems:"center",gap:"6px"},
        onClick:() => setState({ mappingEx: ex }) }, ex);
      if (mc > 0) nameBtn.appendChild(h('span', { style:{background:"#e0e0e0",color:"#888",fontSize:"0.62rem",padding:"1px 6px",borderRadius:"3px"} }, String(mc)));
      const delBtn = h('button', { style:{background:"none",border:"none",borderLeft:"1px solid #e0e0e0",cursor:"pointer",padding:"10px 12px",color:"#cc4444",fontSize:"1rem"},
        onClick:() => { const nd = { ...state.data, exercises: state.data.exercises.filter(e => e !== ex) }; setState({ data: nd }); }
      }, "✕");
      wrap.appendChild(nameBtn); wrap.appendChild(delBtn);
      return wrap;
    });
    return h('div', { style:{marginBottom:"16px"} },
      h('p', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.62rem",color:"#bbb",letterSpacing:"2px",marginBottom:"8px"} }, g.toUpperCase()),
      h('div', { style:{display:"flex",flexWrap:"wrap",gap:"8px"} }, ...pills)
    );
  });

  const inp = h('input', { className:"input-field", placeholder:"New exercise...", value:state.newExName, onInput: e => { state.newExName = e.target.value; } });
  const addBtn = h('button', { className:"btn-ghost", style:{whiteSpace:"nowrap"}, onClick:() => {
    const name = state.newExName.trim();
    if (name && !state.data.exercises.includes(name)) {
      setState({ data: { ...state.data, exercises: [...state.data.exercises, name] }, newExName: "" });
    }
  }}, "ADD");

  const showEx = !!state.showVolumeExercises;
  const toggleBtn = h('button', {
    style: { width:"100%", display:"flex", justifyContent:"space-between", alignItems:"center",
      background: showEx ? "#f0f0f0" : "#f5f5f5", border:"1.5px solid #e0e0e0", borderRadius:"10px",
      padding:"14px 16px", cursor:"pointer", fontFamily:"'Bebas Neue',sans-serif",
      fontSize:"1rem", letterSpacing:"2px", color:"#444", WebkitTapHighlightColor:"transparent" },
    onClick: () => setState({ showVolumeExercises: !showEx })
  },
    h('span', {}, "EXERCISES"),
    h('span', { style:{fontSize:"1.2rem", transition:"transform 0.2s", display:"inline-block",
      transform: showEx ? "rotate(180deg)" : "rotate(0deg)"} }, "▾")
  );

  return h('div', {},
    h('span', { style:{fontSize:"1.5rem",letterSpacing:"3px"} }, "VOLUME"),
    h('p', { className:"slabel", style:{marginTop:"4px"} }, "WEEKLY SETS PER MUSCLE GROUP"),
    weekNav, ...muscleRows,
    h('hr', { className:"divider", style:{marginTop:"24px",marginBottom:"20px"} }),
    toggleBtn,
    ...(showEx ? [
      h('p', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.68rem",color:"#bbb",margin:"12px 0 16px"} }, "Tap name to edit muscle mapping"),
      ...exGroups,
      h('div', { style:{display:"flex",gap:"8px",marginTop:"8px"} }, inp, addBtn)
    ] : [])
  );
}

function renderHistory() {
  const filtered = [...state.data.sessions].reverse().filter(s =>
    !state.histFilter || s.entries.some(e => e.exercise.toLowerCase().includes(state.histFilter.toLowerCase()))
  );
  const inp = h('input', { className:"input-field", style:{marginTop:"12px",marginBottom:"14px"}, placeholder:"Search by exercise...", value:state.histFilter,
    onInput: e => setState({ histFilter: e.target.value }) });

  if (!filtered.length) {
    return h('div', {},
      h('span', { style:{fontSize:"1.5rem",letterSpacing:"3px"} }, "HISTORY"), inp,
      h('p', { style:{fontFamily:"'DM Mono',monospace",color:"#bbb",textAlign:"center",padding:"40px 0"} }, "No sessions yet")
    );
  }

  const cards = filtered.map((sess, idx) => {
    const realIdx = state.data.sessions.length - 1 - idx;
    const sessVol = calcVolume([sess], state.data.exerciseMuscles);
    const bounds = getWeekBounds(sess.date);
    const beforeVol = calcVolume(state.data.sessions.filter(s => s !== sess), state.data.exerciseMuscles, s => s.date >= bounds.start && s.date <= bounds.end);
    const trainedMuscles = Object.keys(sessVol).sort((a,b) => sessVol[b] - sessVol[a]);

    const entryLines = sess.entries.map(e =>
      h('div', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.82rem",color:"#888",marginBottom:"5px"} },
        h('span', { style:{color:"#111"} }, e.exercise), " — " + e.sets.map(s => `${s.weight}lb x ${s.reps}`).join(", ")
      )
    );

    let volSection = h('span', {});
    if (trainedMuscles.length > 0) {
      const mRows = trainedMuscles.map(m => {
        const target = MUSCLE_TARGETS[m];
        const before = Math.round((beforeVol[m]||0)*10)/10;
        const added = sessVol[m]||0;
        const after = Math.round((before+added)*10)/10;
        const max = target ? target.max : Math.max(after, 10);
        const min = target ? target.min : 0;
        const afterColor = !target?"#aaa":after<min?"#e08800":after>max?"#cc2222":"#1a7a1a";
        return h('div', { style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"9px"} },
          h('span', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.72rem",color:"#666",width:"108px",flexShrink:0} }, m),
          volumeBar(before, added, min, max),
          h('span', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.72rem",color:afterColor,width:"28px",textAlign:"right",flexShrink:0,fontWeight:500} }, String(after)),
          target ? h('span', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.6rem",color:"#ccc",width:"38px",flexShrink:0} }, `${min}–${max}`) : h('span',{})
        );
      });
      volSection = h('div', { style:{marginTop:"14px",paddingTop:"12px",borderTop:"1px solid #f0f0f0"} },
        h('p', { className:"slabel" }, "WEEKLY SETS AFTER THIS SESSION"),
        ...mRows,
        h('div', { style:{display:"flex",gap:"12px",marginTop:"8px",fontFamily:"'DM Mono',monospace",fontSize:"0.62rem",color:"#bbb"} },
          h('span', {}, h('span', { style:{display:"inline-block",width:"10px",height:"8px",background:"#c8c8c8",borderRadius:"2px",marginRight:"4px",verticalAlign:"middle"} }), "before"),
          h('span', {}, h('span', { style:{display:"inline-block",width:"10px",height:"8px",background:"#1a7a1a",borderRadius:"2px",marginRight:"4px",verticalAlign:"middle"} }), "added")
        )
      );
    }

    return h('div', { className:"card" },
      h('div', { style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"} },
        h('span', { className:"tag" }, sess.date),
        h('div', { style:{display:"flex",gap:"8px"} },
          h('button', { className:"btn-ghost", style:{padding:"8px 14px",fontSize:"0.85rem"}, onClick:() => setState({ editSess: { idx: realIdx, session: JSON.parse(JSON.stringify(state.data.sessions[realIdx])) } }) }, "EDIT"),
          h('button', { className:"btn-del", onClick:() => setState({ data: { ...state.data, sessions: state.data.sessions.filter((_,i) => i!==realIdx) } }) }, "DELETE")
        )
      ),
      ...entryLines, volSection
    );
  });

  return h('div', {}, h('span', { style:{fontSize:"1.5rem",letterSpacing:"3px"} }, "HISTORY"), inp, ...cards);
}

function renderPRs(prs) {
  return h('div', {},
    h('span', { style:{fontSize:"1.5rem",letterSpacing:"3px",display:"block",marginBottom:"4px"} }, "PERSONAL RECORDS"),
    h('p', { className:"slabel" }, "YOUR HEAVIEST LOGGED LIFT PER EXERCISE"),
    ...(prs.length ? prs.map(({exercise, pr}) =>
      h('div', { className:"pr-card" },
        h('div', {},
          h('div', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.88rem",marginBottom:"4px"} }, exercise),
          h('div', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.65rem",color:"#aaa"} }, pr.date)
        ),
        h('div', { style:{textAlign:"right"} },
          h('div', { style:{color:"#1a8a3a",fontSize:"1.5rem",letterSpacing:"1px"} }, String(pr.weight), h('span', { style:{fontSize:"0.8rem",color:"#aaa",marginLeft:"3px"} }, "lb")),
          h('div', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.72rem",color:"#888"} }, `${pr.reps} reps`)
        )
      )
    ) : [h('p', { style:{fontFamily:"'DM Mono',monospace",color:"#bbb",textAlign:"center",padding:"40px 0"} }, "Log sessions to see PRs here")])
  );
}

function renderMappingModal() {
  if (!state.mappingEx) return h('span', {});
  const rows = ALL_MUSCLES.map(m => {
    const current = getMusclesForExercise(state.mappingEx, state.data.exerciseMuscles);
    const val = current[m] || 0;
    const btns = [0, 0.25, 0.5, 0.75, 1].map(step => {
      const btn = h('button', {
        style: { flex:1, padding:"10px 0", border:"1.5px solid " + (val===step?"#111":"#ddd"), background: val===step?"#111":"#fafafa",
          color: val===step?"#fff":"#888", fontFamily:"'DM Mono',monospace", fontSize:"0.65rem", cursor:"pointer", borderRadius:"8px" },
        onClick: () => {
          const next = { ...current };
          if (step === 0) delete next[m]; else next[m] = step;
          setState({ data: { ...state.data, exerciseMuscles: { ...state.data.exerciseMuscles, [state.mappingEx]: next } } });
        }
      }, step === 0 ? "—" : String(step));
      return btn;
    });
    return h('div', { style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"} },
      h('span', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.73rem",color:val>0?"#111":"#bbb",width:"104px",flexShrink:0} }, m),
      h('div', { style:{display:"flex",gap:"6px",flex:1} }, ...btns)
    );
  });
  const modal = h('div', { className:"modal", onClick: e => e.stopPropagation() },
    h('div', { className:"modal-handle" }),
    h('div', { style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"} },
      h('span', { style:{fontSize:"1.3rem",letterSpacing:"2px"} }, state.mappingEx),
      h('button', { className:"btn-icon", onClick:() => setState({ mappingEx: null }) }, "✕")
    ),
    h('p', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.7rem",color:"#888",marginBottom:"18px"} }, "1.0 = primary, 0.5 = secondary, — = none"),
    ...rows
  );
  return h('div', { className:"overlay", onClick:() => setState({ mappingEx: null }) }, modal);
}

function renderEditModal() {
  if (!state.editSess) return h('span', {});
  const sess = state.editSess.session;

  const entryCards = sess.entries.map((entry, ei) => {
    const setRows = entry.sets.map((set, si) => {
      const wInp = h('input', { className:"num-input", type:"number", inputmode:"decimal", placeholder:"0", value:set.weight });
      wInp.addEventListener('input', e => {
        const s = JSON.parse(JSON.stringify(state.editSess));
        s.session.entries[ei].sets[si].weight = e.target.value;
        setState({ editSess: s });
      });
      const rInp = h('input', { className:"num-input", type:"number", inputmode:"numeric", placeholder:"0", value:set.reps });
      rInp.addEventListener('input', e => {
        const s = JSON.parse(JSON.stringify(state.editSess));
        s.session.entries[ei].sets[si].reps = e.target.value;
        setState({ editSess: s });
      });
      const del = h('button', { className:"btn-icon", style:{color:"#cc4444"}, onClick:() => {
        const s = JSON.parse(JSON.stringify(state.editSess));
        const sets = s.session.entries[ei].sets.filter((_,j) => j!==si);
        s.session.entries[ei].sets = sets.length ? sets : [{weight:"",reps:""}];
        setState({ editSess: s });
      }}, "✕");
      return h('div', { className:"set-row" }, h('span', { className:"set-num" }, String(si+1)), wInp, rInp, del);
    });
    const addSetBtn = h('button', { className:"btn-ghost", style:{marginTop:"8px",fontSize:"0.9rem",padding:"10px 16px"}, onClick:() => {
      const s = JSON.parse(JSON.stringify(state.editSess));
      s.session.entries[ei].sets.push({weight:"",reps:""});
      setState({ editSess: s });
    }}, "+ SET");
    const removeBtn = h('button', { className:"btn-del", style:{fontSize:"0.78rem",padding:"7px 12px"}, onClick:() => {
      const s = JSON.parse(JSON.stringify(state.editSess));
      s.session.entries = s.session.entries.filter((_,i) => i!==ei);
      setState({ editSess: s });
    }}, "REMOVE");
    return h('div', { style:{background:"#f8f8f8",border:"1px solid #ebebeb",borderRadius:"10px",padding:"14px",marginBottom:"10px"} },
      h('div', { style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"} },
        h('span', { style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1rem",letterSpacing:"2px"} }, entry.exercise),
        removeBtn
      ),
      ...setRows, addSetBtn
    );
  });

  const addExPills = state.data.exercises.filter(ex => !sess.entries.find(e => e.exercise === ex)).map(ex =>
    h('button', { className:"ex-pill", onClick:() => {
      const s = JSON.parse(JSON.stringify(state.editSess));
      s.session.entries.push({ exercise: ex, sets: [{weight:"",reps:""},{weight:"",reps:""},{weight:"",reps:""}] });
      setState({ editSess: s });
    }}, ex)
  );

  const dateInp = h('input', { type:"date", value:sess.date,
    style:{fontFamily:"'DM Mono',monospace",fontSize:"0.82rem",background:"#f5f5f5",border:"1.5px solid #e0e0e0",borderRadius:"8px",padding:"8px 12px",color:"#444"} });
  dateInp.addEventListener('change', e => {
    const s = JSON.parse(JSON.stringify(state.editSess));
    s.session.date = e.target.value;
    setState({ editSess: s });
  });

  const modal = h('div', { className:"modal", style:{maxWidth:"520px"}, onClick: e => e.stopPropagation() },
    h('div', { className:"modal-handle" }),
    h('div', { style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"} },
      h('div', { style:{display:"flex",alignItems:"center",gap:"10px"} },
        h('span', { style:{fontSize:"1.3rem",letterSpacing:"3px"} }, "EDIT"),
        dateInp
      ),
      h('button', { className:"btn-icon", onClick:() => setState({ editSess: null }) }, "✕")
    ),
    ...entryCards,
    h('details', { style:{marginTop:"4px",marginBottom:"16px"} },
      h('summary', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.78rem",color:"#888",cursor:"pointer",padding:"10px 0",listStyle:"none"} }, "+ Add exercise to session"),
      h('div', { style:{display:"flex",flexWrap:"wrap",gap:"8px",marginTop:"10px"} }, ...addExPills)
    ),
    h('button', { className:"btn-primary", style:{fontSize:"1.1rem",letterSpacing:"3px"}, onClick:() => {
      const newSessions = state.data.sessions.map((s,i) => i === state.editSess.idx ? state.editSess.session : s);
      setState({ data: { ...state.data, sessions: newSessions }, editSess: null });
    }}, "SAVE CHANGES")
  );
  return h('div', { className:"overlay", onClick:() => setState({ editSess: null }) }, modal);
}

// ── Main render ──────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const weekRange = getWeekRange(state.weekOffset);
  const sessionsToCount = (state.session && state.weekOffset === 0)
    ? [...state.data.sessions, state.session]
    : state.data.sessions;
  const weeklyVol = calcVolume(sessionsToCount, state.data.exerciseMuscles, s => s.date >= weekRange.start && s.date <= weekRange.end);
  state._weeklyVol = weeklyVol; // make available to groupExercises for urgency sorting
  const prs = state.data.exercises.map(ex => ({ exercise: ex, pr: getPR(state.data.sessions, ex) })).filter(x => x.pr);

  const NAV = [
    { id:"dashboard", icon:"🏠", label:"Home" },
    { id:"log",       icon:"✏️",  label:"Log" },
    { id:"volume",    icon:"📊", label:"Volume" },
    { id:"history",   icon:"📋", label:"History" },
    { id:"prs",       icon:"🏆", label:"PRs" },
  ];

  const installBanner = (state.showInstallBanner && state.installPrompt) ? h('div', { className:"install-banner" },
    h('span', {}, "Add YasuFit to your home screen"),
    h('div', { style:{display:"flex",gap:"8px"} },
      h('button', { onClick: async () => {
        state.installPrompt.prompt();
        await state.installPrompt.userChoice;
        setState({ showInstallBanner: false, installPrompt: null });
      }}, "INSTALL"),
      h('button', { className:"dismiss", onClick:() => setState({ showInstallBanner: false }) }, "Later")
    )
  ) : h('span', {});

  const topBar = h('div', { className:"top-bar" },
    h('div', { style:{display:"flex",alignItems:"center",justifyContent:"space-between"} },
      h('div', { style:{display:"flex",alignItems:"baseline",gap:"2px"} },
        h('span', { style:{fontSize:"1.7rem",letterSpacing:"4px"} }, "YASU"),
        h('span', { style:{fontSize:"1.7rem",letterSpacing:"4px",color:"#1a8a3a"} }, "FIT"),
        state.session ? h('span', { style:{fontFamily:"'DM Mono',monospace",fontSize:"0.62rem",color:"#1a8a3a",marginLeft:"10px",background:"var(--accent-bg)",border:"1px solid var(--accent-bd)",padding:"2px 8px",borderRadius:"4px"} }, "LIVE") : h('span', {})
      ),
      h('button', {
        className: "theme-toggle",
        onClick: () => setState({ darkMode: !state.darkMode }),
        title: state.darkMode ? "Switch to light mode" : "Switch to dark mode"
      }, state.darkMode ? "☀️" : "🌙")
    )
  );

  let pageContent;
  if (state.view === "dashboard") pageContent = renderDashboard(weeklyVol, prs);
  else if (state.view === "log") pageContent = renderLog(weeklyVol);
  else if (state.view === "volume") pageContent = renderVolume(weeklyVol);
  else if (state.view === "history") pageContent = renderHistory();
  else pageContent = renderPRs(prs);

  const bottomNav = h('div', { className:"bottom-nav" },
    ...NAV.map(n => {
      const item = h('button', { className:"nav-item" + (state.view===n.id?" active":""), onClick:() => setState({ view: n.id }) },
        h('span', { className:"nav-icon" }, n.icon),
        h('span', { className:"nav-label" }, n.label),
        ...(state.view===n.id ? [h('span', { className:"nav-dot" })] : [])
      );
      return item;
    })
  );

  const shell = h('div', { className:"app-shell" },
    installBanner, topBar,
    h('div', { className:"page-content" }, pageContent),
    bottomNav
  );

  app.innerHTML = '';
  app.appendChild(shell);
  app.appendChild(renderMappingModal());
  app.appendChild(renderEditModal());
}

render();
</script>
</body>
</html>
